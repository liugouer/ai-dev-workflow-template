# 模板仓库自检流水线
# 本流水线仅用于检查模板文件完整性，不执行业务测试或 TAPD 操作。
#
# 新业务项目请使用 templates/cnb-pipeline-template.yml

main:
  pull_request:
    - name: Template integrity validation
      docker:
        image: python:3.11-slim
      stages:
        - name: Validate template files
          script: |
            set -e
            echo "=== 模板仓库自检 ==="

            errors=0

            echo ""
            echo "--- 必须存在的模板文件 ---"

            required_files="
              README.md
              NEW_PROJECT_SETUP.md
              workflow.config.example.yml
              templates/autonomous-workflow-rules-template.mdc
              templates/newdev-command-template.md
              templates/tapd-requirement-template.md
              templates/cnb-pipeline-template.yml
              docs/workflow-template/REUSE_CHECKLIST.md
            "

            for f in $required_files; do
              if [ -f "$f" ]; then
                echo "  OK: $f"
              else
                echo "  MISSING: $f"
                errors=$((errors + 1))
              fi
            done

            echo ""
            echo "--- templates/knowledge-files/ 目录 ---"
            if [ -d "templates/knowledge-files" ]; then
              echo "  OK: templates/knowledge-files/ exists"
            else
              echo "  MISSING: templates/knowledge-files/ does not exist"
              errors=$((errors + 1))
            fi

            echo ""
            echo "--- 不应存在的业务目录 ---"

            forbidden_dirs="
              src
              tests
              specs
              reports
            "

            for d in $forbidden_dirs; do
              if [ -d "$d" ]; then
                echo "  WARNING: $d/ should not exist in template repo"
                errors=$((errors + 1))
              else
                echo "  OK: $d/ not found (as expected)"
              fi
            done

            echo ""
            echo "--- 不应存在的构建产物 ---"

            forbidden_files="
              coverage.xml
              .coverage
            "

            for f in $forbidden_files; do
              if [ -f "$f" ]; then
                echo "  WARNING: $f should not exist in template repo"
                errors=$((errors + 1))
              else
                echo "  OK: $f not found (as expected)"
              fi
            done

            echo ""
            echo "--- 不应存在的缓存目录 ---"
            if [ -d ".pytest_cache" ]; then
              echo "  WARNING: .pytest_cache/ should not exist in template repo"
              errors=$((errors + 1))
            else
              echo "  OK: .pytest_cache/ not found (as expected)"
            fi

            echo ""
            echo "--- 检查硬编码敏感信息 ---"

            # 检查是否含有真实的 API 密钥或 token（非占位符、非环境变量读取）
            no_leaks=true

            # 排除规则：包含以下模式的行不算泄漏
            #   - 包含 < (模板占位符: <your-xxx>, <你的...>)
            #   - env( 或 env[ (从环境变量读取)
            #   - 以 # 开头 (注释)
            #   - 属于当前自检脚本自身 (chk_pattern)
            for chk_pattern in TAPD_API_USER TAPD_API_PASSWORD TAPD_API_TOKEN TAPD_API_SECRET TAPD_API_KEY; do
              found=$(grep -rI "$chk_pattern" . --exclude-dir=.git 2>/dev/null || true)
              # 过滤掉合法引用
              real=$(echo "$found" \
                | grep -v "sensitive_patterns" \
                | grep -v "for chk_pattern" \
                | grep -v "^[^:]*:[[:space:]]*#" \
                | grep -v "<" \
                | grep -v "env(" \
                | grep -v "env\[" \
                | grep -v "export " \
                || true)
              if [ -n "$real" ]; then
                echo "  WARNING: potential hardcoded secret: $chk_pattern"
                echo "$real"
                no_leaks=false
                errors=$((errors + 1))
              else
                echo "  OK: $chk_pattern not hardcoded"
              fi
            done

            echo ""
            if [ "$errors" -gt 0 ]; then
              echo "=== 自检失败: $errors 个问题 ==="
              exit 1
            else
              echo "=== 自检全部通过 ==="
              exit 0
            fi

