# 模板仓库自检流水线
# 本流水线仅用于检查模板文件完整性，不执行业务测试或 TAPD 操作。
#
# 新业务项目请使用 templates/cnb-pipeline-template.yml

main:
  api_trigger:
    - name: Validate template files (manual)
      docker:
        image: python:3.11-slim
      stages:
        - name: Run validate script
          script: |
            set -e
            echo "=== 模板仓库 API 自检 ==="
            python scripts/validate_template.py

  pull_request:
    - name: Validate template files (PR)
      docker:
        image: python:3.11-slim
      stages:
        - name: Run validate script
          script: |
            set -e
            echo "=== 模板仓库 PR 自检 ==="
            python scripts/validate_template.py

  push:
    - name: Validate template files (Push)
      docker:
        image: python:3.11-slim
      stages:
        - name: Run validate script
          script: |
            set -e
            echo "=== 模板仓库 Push 自检 ==="
            python scripts/validate_template.py
